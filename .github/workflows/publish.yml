name: Publish

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "schemas/**"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - "scripts/build-check.mjs"
      - ".github/workflows/publish.yml"
      - "CHANGELOG.md"
  workflow_dispatch: {}

concurrency:
  group: publish-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

  canary:
    name: Publish Canary
    needs: quality
    # Gated on `vars.ENABLE_CANARY == 'true'`. Set via:
    #   gh variable set ENABLE_CANARY --body 'true' --repo bntvllnt/pi-gateway
    # Recommended only after npm trusted-publisher is configured for
    # bntvllnt/pi-gateway (see https://www.npmjs.com/settings/~/packages).
    if: github.event_name == 'push' && vars.ENABLE_CANARY == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish canary
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" 2>/dev/null || true
          unset NODE_AUTH_TOKEN
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"
          npm version "$CANARY_VERSION" --no-git-tag-version
          TARBALL=$(pnpm pack --pack-destination /tmp | tail -1)
          npx --yes npm@latest publish "$TARBALL" --tag canary --provenance --access public

  release:
    name: Publish Release
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Read version + guard against retag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists. Bump package.json on main via a PR before dispatching."
            exit 1
          fi

      - name: Extract CHANGELOG section for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing. Add a `## [${VERSION}]` section before dispatching."
            exit 1
          fi
          # Extract everything from `## [<VERSION>]` (with optional ` - <date>`)
          # up to the next `## [` heading. Strip the heading line itself.
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { in_section = 0 }
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "^## \\[" ver "\\]") { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::error::No `## [${VERSION}]` section found in CHANGELOG.md."
            echo "::error::Move the contents of `## [Unreleased]` under `## [${VERSION}] - $(date +%Y-%m-%d)` and try again."
            exit 1
          fi
          # Preserve newlines via the GHA multiline-output protocol.
          {
            echo "body<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish to npm
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" 2>/dev/null || true
          unset NODE_AUTH_TOKEN
          TARBALL=$(pnpm pack --pack-destination /tmp | tail -1)
          npx --yes npm@latest publish "$TARBALL" --tag latest --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat <<'NOTES_EOF' > /tmp/release-notes.md
          ${{ steps.changelog.outputs.body }}
          NOTES_EOF
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md
